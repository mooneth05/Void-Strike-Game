<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID STRIKER — Space Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020510;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  h1 {
    color: #00f0ff;
    font-size: 1.4rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 0 20px #00f0ff88;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    color: #aaa;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
  }
  #hud span { color: #00f0ff; font-weight: bold; }
  #gameCanvas {
    border: 1px solid #00f0ff33;
    box-shadow: 0 0 40px #00f0ff22, inset 0 0 60px #00010a;
    display: block;
  }
  #lives-bar { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
  .heart { color: #ff4466; font-size: 1.1rem; }
  .heart.dead { color: #333; }

  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: white;
    text-align: center;
    padding: 24px;
    background: rgba(2,5,16,0.93);
    border: 1px solid #00f0ff44;
    border-radius: 4px;
    min-width: 300px;
    max-width: 360px;
    max-height: 90vh;
    overflow-y: auto;
  }
  #overlay h2 {
    font-size: 1.6rem;
    letter-spacing: 0.3em;
    color: #00f0ff;
    text-shadow: 0 0 20px #00f0ff;
  }
  #overlay p { color: #888; font-size: 0.78rem; letter-spacing: 0.1em; }
  #overlay .score-big { font-size: 1.8rem; color: #fff; letter-spacing: 0.2em; }

  .btn {
    background: transparent;
    border: 1px solid #00f0ff;
    color: #00f0ff;
    padding: 8px 28px;
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn:hover { background: #00f0ff; color: #020510; }

  .tabs { display: flex; gap: 4px; width: 100%; margin-top: 4px; }
  .tab {
    flex: 1;
    background: transparent;
    border: 1px solid #1a1a2e;
    color: #444;
    padding: 5px;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .tab.active { border-color: #00f0ff44; color: #00f0ff; background: #00f0ff0a; }
  .panel { width: 100%; text-align: left; }

  #ach-toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #020510ee;
    border: 1px solid #00f0ff44;
    border-radius: 4px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Courier New', monospace;
    color: #00f0ff;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #ach-toast.show { opacity: 1; }

  #controls {
    margin-top: 10px;
    color: #444;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-align: center;
  }

  #nameInput {
    background: transparent;
    border: 1px solid #00f0ff44;
    color: #00f0ff;
    padding: 6px 12px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    width: 160px;
  }
  #nameInput::placeholder { color: #335; }
</style>
</head>
<body>

<h1>⚡ VOID STRIKER</h1>
<div id="hud">
  <div>SCORE: <span id="scoreDisplay">0</span></div>
  <div>WAVE: <span id="waveDisplay">1</span></div>
  <div>HI: <span id="hiDisplay">0</span></div>
</div>

<canvas id="gameCanvas" width="480" height="560"></canvas>

<div id="lives-bar">
  <span class="heart" id="h1">♥</span>
  <span class="heart" id="h2">♥</span>
  <span class="heart" id="h3">♥</span>
</div>

<div id="controls">← → / A D — Move &nbsp;|&nbsp; SPACE — Shoot &nbsp;|&nbsp; Mobile: tap sides to move, tap center to shoot</div>

<div style="margin-top: 12px;">
  <a href="https://orynth.dev/projects/xianxiaworldwuxia" target="_blank" rel="noopener">
    <img src="https://orynth.dev/api/badge/xianxiaworldwuxia?theme=light&style=default" alt="Featured on Orynth" width="260" height="80" />
  </a>
</div>

<div id="ach-toast">
  <span id="ach-toast-icon">🏆</span>
  <div>
    <div style="color:#ffdd00;font-size:0.65rem">ACHIEVEMENT UNLOCKED</div>
    <div id="ach-toast-name" style="letter-spacing:0.15em"></div>
  </div>
</div>

<div id="overlay"></div>

<script>
// ═══════════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════════
const Leaderboard = (() => {
  const KEY = 'voidstriker_leaderboard';
  const MAX = 10;

  function getAll() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
  }
  function save(entries) { localStorage.setItem(KEY, JSON.stringify(entries)); }

  function submit(name, score, wave) {
    const entries = getAll();
    entries.push({ name: name || 'PILOT', score, wave, date: Date.now() });
    entries.sort((a, b) => b.score - a.score);
    const trimmed = entries.slice(0, MAX);
    save(trimmed);
    return trimmed.findIndex(e => e.score === score && e.wave === wave);
  }

  function isHighScore(score) {
    const entries = getAll();
    if (entries.length < MAX) return true;
    return score > entries[entries.length - 1].score;
  }

  function renderHTML(highlightIdx = -1) {
    const entries = getAll();
    if (entries.length === 0) {
      return '<p style="color:#555;font-size:0.75rem;letter-spacing:0.1em;text-align:center;padding:8px">NO RECORDS YET</p>';
    }
    return `
      <table style="width:100%;border-collapse:collapse;font-size:0.72rem;letter-spacing:0.08em">
        <thead>
          <tr style="color:#555;border-bottom:1px solid #1a1a2e">
            <th style="padding:4px 6px;text-align:left">#</th>
            <th style="padding:4px 6px;text-align:left">PILOT</th>
            <th style="padding:4px 6px;text-align:right">SCORE</th>
            <th style="padding:4px 6px;text-align:right">WAVE</th>
          </tr>
        </thead>
        <tbody>
          ${entries.map((e, i) => `
            <tr style="color:${i===highlightIdx?'#00f0ff':i===0?'#ffd700':'#888'};background:${i===highlightIdx?'#00f0ff11':'transparent'};border-bottom:1px solid #0a0a1a">
              <td style="padding:4px 6px">${i+1}</td>
              <td style="padding:4px 6px">${e.name.substring(0,8).toUpperCase()}</td>
              <td style="padding:4px 6px;text-align:right">${e.score.toLocaleString()}</td>
              <td style="padding:4px 6px;text-align:right">${e.wave}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  return { getAll, submit, isHighScore, renderHTML };
})();

// ═══════════════════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════════════════
const Achievements = (() => {
  const KEY = 'voidstriker_achievements';

  const DEFS = [
    { id: 'first_blood',   icon: '🎯', name: 'FIRST BLOOD',    desc: 'Destroy your first enemy',            check: s => s.totalKills >= 1 },
    { id: 'wave5',         icon: '🌊', name: 'DEEP VOID',       desc: 'Reach wave 5',                        check: s => s.wave >= 5 },
    { id: 'wave10',        icon: '🚀', name: 'VOID VETERAN',    desc: 'Reach wave 10',                       check: s => s.wave >= 10 },
    { id: 'score1k',       icon: '⭐', name: 'STAR HUNTER',     desc: 'Score 1,000 points',                  check: s => s.score >= 1000 },
    { id: 'score5k',       icon: '💫', name: 'GALAXY LEGEND',   desc: 'Score 5,000 points',                  check: s => s.score >= 5000 },
    { id: 'tank_killer',   icon: '💜', name: 'TANK BUSTER',     desc: 'Destroy 5 tank enemies',              check: s => s.tankKills >= 5 },
    { id: 'no_damage_w1',  icon: '🛡️', name: 'UNTOUCHABLE',     desc: 'Complete wave 1 without getting hit', check: s => s.wave >= 2 && s.hitsOnWave1 === 0 },
    { id: 'powerup_first', icon: '⚡', name: 'POWERED UP',      desc: 'Collect your first power-up',         check: s => s.powerupsCollected >= 1 },
    { id: 'powerup5',      icon: '🔋', name: 'ENERGY HOARDER',  desc: 'Collect 5 power-ups',                 check: s => s.powerupsCollected >= 5 },
    { id: 'perfectionist', icon: '👑', name: 'PERFECTIONIST',   desc: 'Clear a wave with full 3 lives',      check: s => s.wavesClearedFullHp >= 1 },
    { id: 'speedrun',      icon: '⚡', name: 'LIGHTNING PILOT', desc: 'Clear wave 3 in under 30 seconds',    check: s => s.wave3ClearTime !== null && s.wave3ClearTime < 30 },
    { id: 'survivor',      icon: '❤️', name: 'SURVIVOR',        desc: 'Survive a hit and keep going',        check: s => s.hitsTotal >= 1 && s.wave >= 2 },
  ];

  let unlocked = new Set();
  let session = mkSession();
  let onUnlock = null;

  function mkSession() {
    return { score:0, wave:1, totalKills:0, tankKills:0, hitsTotal:0, hitsOnWave1:0,
      powerupsCollected:0, wavesClearedFullHp:0, wave3ClearTime:null, _wave3Start:null };
  }

  function load() {
    try { unlocked = new Set(JSON.parse(localStorage.getItem(KEY)) || []); } catch { unlocked = new Set(); }
  }
  function persist() { localStorage.setItem(KEY, JSON.stringify([...unlocked])); }

  function setUnlockCallback(fn) { onUnlock = fn; }

  function startGame() { session = mkSession(); load(); }

  function check() {
    DEFS.forEach(def => {
      if (!unlocked.has(def.id) && def.check(session)) {
        unlocked.add(def.id); persist();
        if (onUnlock) onUnlock(def);
      }
    });
  }

  function onKill(type) { session.totalKills++; if (type==='tank') session.tankKills++; check(); }
  function onHit(currentLives, currentWave) { session.hitsTotal++; if (currentWave===1) session.hitsOnWave1++; check(); }
  function onWaveClear(wave, lives, elapsed) {
    session.wave = wave + 1;
    if (lives === 3) session.wavesClearedFullHp++;
    if (wave === 3 && session._wave3Start !== null) session.wave3ClearTime = elapsed - session._wave3Start;
    if (wave === 2) session._wave3Start = elapsed;
    check();
  }
  function onScoreUpdate(score) { session.score = score; check(); }
  function onPowerupCollect() { session.powerupsCollected++; check(); }

  function renderHTML() {
    load();
    return DEFS.map(a => {
      const u = unlocked.has(a.id);
      return `<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;background:${u?'#00f0ff08':'#0a0a0a'};border:1px solid ${u?'#00f0ff22':'#111'};border-radius:3px;margin-bottom:4px;opacity:${u?1:0.4}">
        <span style="font-size:1.1rem">${u?a.icon:'🔒'}</span>
        <div>
          <div style="color:${u?'#00f0ff':'#555'};font-size:0.72rem;letter-spacing:0.1em">${a.name}</div>
          <div style="color:#444;font-size:0.65rem">${a.desc}</div>
        </div>
      </div>`;
    }).join('');
  }

  return { startGame, setUnlockCallback, onKill, onHit, onWaveClear, onScoreUpdate, onPowerupCollect, renderHTML };
})();

// ═══════════════════════════════════════════════════════
// POWERUPS
// ═══════════════════════════════════════════════════════
const Powerups = (() => {
  const TYPES = {
    shield:    { icon:'🛡️', color:'#00f0ff', glowColor:'#00f0ff66', label:'SHIELD',     desc:'+1 LIFE',      duration:0,
      apply(s){ if(s.lives<3){s.lives=Math.min(3,s.lives+1);if(s.updateHearts)s.updateHearts();} } },
    rapidfire: { icon:'⚡', color:'#ffdd00', glowColor:'#ffdd0066', label:'RAPID FIRE', desc:'5 SEC',        duration:300,
      apply(s){ s.shootCooldownMult=0.3; }, expire(s){ s.shootCooldownMult=1; } },
    spread:    { icon:'🔱', color:'#ff44ff', glowColor:'#ff44ff66', label:'SPREAD SHOT',desc:'5 SEC',        duration:300,
      apply(s){ s.spreadShot=true; }, expire(s){ s.spreadShot=false; } },
    nuke:      { icon:'💥', color:'#ff6600', glowColor:'#ff660066', label:'NUKE',       desc:'CLEAR SCREEN', duration:0,
      apply(s){ if(s.nukeEnemies)s.nukeEnemies(); } },
    slow:      { icon:'❄️', color:'#88ddff', glowColor:'#88ddff44', label:'TIME SLOW',  desc:'4 SEC',        duration:240,
      apply(s){ s.enemySpeedMult=0.3; }, expire(s){ s.enemySpeedMult=1; } },
  };

  const TYPE_KEYS = Object.keys(TYPES);
  let items = [], activeEffects = [], spawnTimer = 0, SPAWN_INTERVAL = 400;
  let onCollect = null;

  function reset() { items=[]; activeEffects=[]; spawnTimer=0; SPAWN_INTERVAL=400; }
  function setCollectCallback(fn) { onCollect = fn; }

  function spawn(canvasW) {
    const type = TYPE_KEYS[Math.floor(Math.random()*TYPE_KEYS.length)];
    items.push({ x:30+Math.random()*(canvasW-60), y:-20, vy:1.5, type, def:TYPES[type], pulse:0, size:18 });
  }

  function update(W, H, state) {
    if (++spawnTimer >= SPAWN_INTERVAL) { spawn(W); spawnTimer=0; SPAWN_INTERVAL=Math.max(200,SPAWN_INTERVAL-5); }
    items = items.filter(p => { p.y+=p.vy; p.pulse+=0.08; return p.y<H+30; });
    items = items.filter(p => {
      if (Math.abs(p.x-state.playerX)<24 && Math.abs(p.y-state.playerY)<24) {
        p.def.apply(state);
        if (p.def.duration>0) {
          activeEffects = activeEffects.filter(e=>e.type!==p.type);
          activeEffects.push({type:p.type, def:p.def, timer:p.def.duration});
        }
        if (onCollect) onCollect(p.type, p.def);
        return false;
      }
      return true;
    });
    activeEffects = activeEffects.filter(e => { e.timer--; if(e.timer<=0){if(e.def.expire)e.def.expire(state);return false;} return true; });
  }

  function draw(ctx) {
    items.forEach(({ x, y, def, pulse, size }) => {
      const grd = ctx.createRadialGradient(x,y,0,x,y,size+8);
      grd.addColorStop(0,def.glowColor); grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,size+8,0,Math.PI*2); ctx.fill();
      ctx.save();
      ctx.globalAlpha=0.85+Math.sin(pulse)*0.15;
      ctx.strokeStyle=def.color; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2); ctx.stroke();
      ctx.font=`${size-2}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(def.icon,x,y);
      ctx.font='8px "Courier New"'; ctx.fillStyle=def.color; ctx.globalAlpha=0.7;
      ctx.fillText(def.label,x,y+size+10);
      ctx.restore();
    });
  }

  function drawHUD(ctx) {
    if (!activeEffects.length) return;
    let ox=8;
    activeEffects.forEach(e => {
      const pct=e.timer/e.def.duration, barW=56;
      ctx.save(); ctx.globalAlpha=0.9;
      ctx.fillStyle='#0a0a1a'; ctx.strokeStyle=e.def.color+'88'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(ox,8,barW,18,3); ctx.fill(); ctx.stroke();
      ctx.fillStyle=e.def.color+'66';
      ctx.beginPath(); ctx.roundRect(ox+2,8+11,(barW-4)*pct,5,2); ctx.fill();
      ctx.font='7px "Courier New"'; ctx.fillStyle=e.def.color; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText(e.def.label,ox+4,9);
      ctx.restore(); ox+=barW+6;
    });
  }

  return { reset, update, draw, drawHUD, setCollectCallback };
})();

// ═══════════════════════════════════════════════════════
// GAME
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const waveDisplay = document.getElementById('waveDisplay');
const hiDisplay = document.getElementById('hiDisplay');

const W = canvas.width, H = canvas.height;
let score=0, hi=0, lives=3, wave=1;
let gameRunning=false, gameOver=false, gameStartTime=0;

// Shared state object for powerups
const state = {
  playerX: W/2, playerY: H-70,
  lives: 3,
  shootCooldownMult: 1,
  spreadShot: false,
  enemySpeedMult: 1,
  updateHearts,
  nukeEnemies() {
    enemies.forEach(e => {
      const pts=e.type==='fast'?20:e.type==='tank'?50:10;
      score+=pts;
      spawnParticles(e.x,e.y,e.type==='fast'?'#ffaa00':e.type==='tank'?'#aa44ff':'#ff4466',14);
    });
    enemies=[];
    scoreDisplay.textContent=score;
    if(score>hi){hi=score;hiDisplay.textContent=hi;}
  }
};

// Stars
const stars = Array.from({length:120},()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.5+0.2,
  speed:Math.random()*0.8+0.2,
  opacity:Math.random()*0.7+0.2
}));

const player = { x:W/2, y:H-70, speed:5, shootCooldown:0, invincible:0 };
let bullets=[], enemyBullets=[], enemies=[], particles=[], floatTexts=[];

const keys={};
document.addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='Space')e.preventDefault(); });
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

let touchLeft=false, touchRight=false, touchShoot=false;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const x=t.clientX-canvas.getBoundingClientRect().left;
    if(x<W*0.33) touchLeft=true;
    else if(x>W*0.67) touchRight=true;
    else touchShoot=true;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  touchLeft=false; touchRight=false; touchShoot=false;
},{passive:false});

// Achievement toast
Achievements.setUnlockCallback(def=>{
  const toast=document.getElementById('ach-toast');
  document.getElementById('ach-toast-icon').textContent=def.icon;
  document.getElementById('ach-toast-name').textContent=def.name;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
});

// Powerup collect
Powerups.setCollectCallback((type,def)=>{
  Achievements.onPowerupCollect();
  lives=state.lives; updateHearts();
  showFloat(def.label,state.playerX,state.playerY-30,def.color);
});

// ── Floats ──
function showFloat(text,x,y,color='#fff'){
  floatTexts.push({text,x,y,color,life:1,vy:-0.8});
}
function tickFloats(){
  floatTexts=floatTexts.filter(f=>{f.y+=f.vy;f.life-=0.018;return f.life>0;});
}
function drawFloats(){
  floatTexts.forEach(f=>{
    ctx.save(); ctx.globalAlpha=f.life;
    ctx.fillStyle=f.color; ctx.font='bold 11px "Courier New"';
    ctx.textAlign='center'; ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  });
}

// ── Wave spawn ──
function spawnWave(){
  enemies=[];
  const cols=Math.min(5+wave,9);
  const rows=Math.min(1+Math.floor(wave/2),4);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const type=r===0&&wave>2?'fast':(r>=rows-1&&wave>4?'tank':'basic');
      enemies.push({
        x:50+c*(W-100)/(cols-1||1), y:50+r*50,
        type, hp:type==='tank'?3:1, maxHp:type==='tank'?3:1,
        dx:(1+wave*0.2)*(Math.random()>0.5?1:-1),
        shootTimer:Math.random()*120+60, wobble:0, alive:true
      });
    }
  }
}

function spawnParticles(x,y,color,count=12){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*0.04+0.02,r:Math.random()*3+1,color});
  }
}

// ── Draw functions ──
function drawStars(){
  stars.forEach(s=>{
    s.y+=s.speed; if(s.y>H){s.y=0;s.x=Math.random()*W;}
    ctx.globalAlpha=s.opacity; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawPlayer(){
  const x=player.x,y=player.y;
  if(player.invincible>0&&Math.floor(player.invincible/5)%2===0) return;
  const grd=ctx.createRadialGradient(x,y+22,0,x,y+22,18);
  grd.addColorStop(0,'#00f0ff88'); grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y+22,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a8fff';
  ctx.beginPath(); ctx.moveTo(x,y-20); ctx.lineTo(x-14,y+16); ctx.lineTo(x-6,y+10); ctx.lineTo(x+6,y+10); ctx.lineTo(x+14,y+16); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#00f0ff';
  ctx.beg
