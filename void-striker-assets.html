<h2>⚡ Void Striker — Visual Assets</h2>

<script>
// Wire up download buttons to inline SVG data
function makeDL(btnId, svgId, filename) {
  const btn = document.getElementById(btnId);
  const svg = document.getElementById(svgId);
  if (!btn || !svg) return;
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], {type:'image/svg+xml'});
  btn.href = URL.createObjectURL(blob);
  btn.download = filename;
}
window.addEventListener('load', () => {
  makeDL('dl-horiz',      'logo-horiz',      'void-striker-logo-horizontal.svg');
  makeDL('dl-icon-dark',  'logo-icon-dark',  'void-striker-icon-dark.svg');
  makeDL('dl-icon-trans', 'logo-icon-trans', 'void-striker-icon-transparent.svg');
  makeDL('dl-banner',     'bg-banner',       'void-striker-banner.svg');
});
</script>
